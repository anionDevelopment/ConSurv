      tags:
      - MaintenanceRoutes
  /API/Other/Maintenance/ShowAllEndpoints:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Resources/Information/Contact:
    get:
      responses:
        '200':
          description: OK
      tags:
      - CommonRoutes
  /API/Other/Resources/Information/License:
    get:
      responses:
        '200':
          description: OK
      tags:
      - CommonRoutes
  /API/Other/Resources/Information/TermsOfService:
    get:
      responses:
        '200':
          description: OK
      tags:
      - CommonRoutes
  /API/v3/CameraController/Camera/{cameraId}:
    get:
      parameters:
      - in: path
        name: cameraId
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraDTO'
            text/json:
              schema:
                $ref: '#/components/schemas/CameraDTO'
            text/plain:
              schema:
                $ref: '#/components/schemas/CameraDTO'
          description: OK
      tags:
      - Camera
  /API/v3/CameraController/Cameras:
    get:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/CameraDTO'
                type: array
            text/json:
              schema:
                items:
                  $ref: '#/components/schemas/CameraDTO'
                type: array
            text/plain:
              schema:
                items:
                  $ref: '#/components/schemas/CameraDTO'
                type: array
          description: OK
      tags:
      - Camera
  /API/v3/CameraController/CreateCamera:
    post:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
            text/json:
              schema:
                type: string
            text/plain:
              schema:
                type: string
          description: OK
      tags:
      - Camera
  /API/v3/CameraController/DownloadVideo/{cameraId}/{filename}:
    get:
      parameters:
      - in: path
        name: cameraId
        required: true
        schema:
          type: string
      - in: path
        name: filename
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      tags:
      - Camera
  /API/v3/CameraController/GetPreview/{cameraId}:
    get:
      parameters:
      - in: path
        name: cameraId
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
