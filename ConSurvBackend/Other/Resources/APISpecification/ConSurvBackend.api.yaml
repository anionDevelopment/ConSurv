components:
  schemas:
    AccessToken:
      additionalProperties: false
      properties:
        expiredMoment:
          format: date-time
          type: string
        ownerUserId:
          nullable: true
          type: string
        value:
          nullable: true
          type: string
      type: object
    CameraDTO:
      additionalProperties: false
      description: 'Data transfer object that exposes the full observable state of
        a camera to clients,

        combining its identity, video source, recording configuration, and current
        record state.'
      properties:
        cameraId:
          nullable: true
          type: string
        name:
          nullable: true
          type: string
        recordModeDTO:
          $ref: '#/components/schemas/RecordModeDTO'
        recordStateDTO:
          $ref: '#/components/schemas/RecordStateDTO'
        videoInformationDTO:
          $ref: '#/components/schemas/VideoInformationDTO'
      type: object
    ONVIFCommandDTO:
      additionalProperties: false
      description: 'Data transfer object used to deserialize an ONVIF PTZ command
        received from a client.

        The ConSurvBackend.Core.Model.DTOs.ONVIFCommandDTO.CommandType discriminator
        selects the concrete ConSurvBackend.Core.Model.SpecialFunctions.ONVIF.Commands.ONVIFCommand
        subtype.'
      properties:
        commandType:
          nullable: true
          type: string
        direction:
          nullable: true
          type: string
      type: object
    RecordModeDTO:
      additionalProperties: false
      description: 'Data transfer object that encodes a ConSurvBackend.Core.Model.RecordModes.RecordMode
        as its type name

        for serialization and deserialization across the API boundary.'
      properties:
        recordMode:
          nullable: true
          type: string
      type: object
    RecordStateDTO:
      additionalProperties: false
      description: 'Data transfer object that encodes the current ConSurvBackend.Core.Model.RecordStates.RecordState
        of a camera

        as its type name for transport over the API.'
      properties:
        recordState:
          nullable: true
          type: string
      type: object
    UpdateCameraDTO:
      additionalProperties: false
      description: Data transfer object that carries the fields a client wishes to
        update for an existing camera.
      properties:
        cameraId:
          nullable: true
          type: string
        name:
          nullable: true
          type: string
        recordModeDTO:
          $ref: '#/components/schemas/RecordModeDTO'
        videoInformationDTO:
          $ref: '#/components/schemas/VideoInformationDTO'
      type: object
    UserInformationDTO:
      additionalProperties: false
      description: 'Data transfer object that exposes basic identity and role information
        about

        a logged-in user to the client.'
      properties:
        id:
          nullable: true
          type: string
        isAdmin:
          type: boolean
        isModerator:
          type: boolean
        name:
          nullable: true
          type: string
      type: object
    VideoInformationDTO:
      additionalProperties: false
      description: 'Data transfer object for the video-source configuration of a camera,

        carrying only the fields that are safe to expose over the API.'
      properties:
        onvifPassword:
          nullable: true
          type: string
        onvifUrl:
          nullable: true
          type: string
        onvifUsername:
          nullable: true
          type: string
        streamURL:
          nullable: true
          type: string
        supportsPTZViaONVIF:
          type: boolean
      type: object
info:
  contact:
    name: Contact
    url: https://consurvbackend.test.local:443/API/Other/Resources/Information/Contact
  description: ConSurvBackend is the backend for ConSurv.
  license:
    name: License
    url: https://consurvbackend.test.local:443/API/Other/Resources/Information/License
  termsOfService: https://consurvbackend.test.local:443/API/Other/Resources/Information/TermsOfService
  title: ConSurvBackend v3.0.28 API documentation
  version: v3.0.28
openapi: 3.0.4
paths:
  /API/Other/Maintenance/AvailabilityCheck:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Maintenance/CurrentVersion:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Maintenance/HealthCheck:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Maintenance/InitializationState:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Maintenance/Metrics:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Maintenance/ShowAllEndpoints:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Resources/Information/Contact:
    get:
      responses:
        '200':
          description: OK
      tags:
      - CommonRoutes
  /API/Other/Resources/Information/License:
    get:
      responses:
        '200':
          description: OK
      tags:
      - CommonRoutes
  /API/Other/Resources/Information/TermsOfService:
    get:
      responses:
        '200':
          description: OK
      tags:
      - CommonRoutes
  /API/v3/CameraController/Camera/{cameraId}:
    get:
      parameters:
      - description: The unique identifier of the camera to retrieve.
        in: path
        name: cameraId
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraDTO'
            text/json:
              schema:
                $ref: '#/components/schemas/CameraDTO'
            text/plain:
              schema:
                $ref: '#/components/schemas/CameraDTO'
          description: OK
      summary: Retrieves the full configuration details of a specific camera.
      tags:
      - Camera
  /API/v3/CameraController/Cameras:
    get:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/CameraDTO'
                type: array
            text/json:
              schema:
                items:
                  $ref: '#/components/schemas/CameraDTO'
                type: array
            text/plain:
              schema:
                items:
                  $ref: '#/components/schemas/CameraDTO'
                type: array
          description: OK
      summary: Returns the list of all configured cameras visible to the current user.
      tags:
      - Camera
  /API/v3/CameraController/CreateCamera:
    post:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
            text/json:
              schema:
                type: string
            text/plain:
              schema:
                type: string
          description: OK
      summary: Creates a new camera with default name and RTSP address and returns
        its generated identifier.
      tags:
      - Camera
  /API/v3/CameraController/DownloadVideo/{cameraId}/{filename}:
    get:
      parameters:
      - description: The unique identifier of the camera that owns the video.
        in: path
        name: cameraId
        required: true
        schema:
          type: string
      - description: The filename of the recorded video to download.
        in: path
        name: filename
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      summary: Downloads the raw bytes of a specific recorded video file for a given
        camera.
      tags:
      - Camera
  /API/v3/CameraController/GetPreview/{cameraId}:
    get:
      parameters:
      - description: The unique identifier of the camera whose preview should be retrieved.
        in: path
        name: cameraId
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                format: byte
                type: string
            text/json:
              schema:
                format: byte
                type: string
            text/plain:
              schema:
                format: byte
                type: string
          description: OK
      summary: Returns the latest preview image (as raw bytes) for the specified camera.
      tags:
      - Camera
  /API/v3/CameraController/GetPreviewOfVideo{cameraId}/{filename}:
    get:
      parameters:
      - description: The unique identifier of the camera that owns the video.
        in: path
        name: cameraId
        required: true
        schema:
          type: string
      - description: The filename of the recorded video for which the preview is requested.
        in: path
        name: filename
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      summary: Returns a preview thumbnail image for the specified recorded video
        file of a camera.
      tags:
      - Camera
  /API/v3/CameraController/ListVideos:
    get:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      summary: Returns a dictionary mapping each camera identifier to the list of
        recorded video filenames available for that camera.
      tags:
      - Camera
  /API/v3/CameraController/RemoveCamera/{cameraId}:
    delete:
      parameters:
      - description: The unique identifier of the camera to remove.
        in: path
        name: cameraId
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      summary: Permanently removes the specified camera and all associated data.
      tags:
      - Camera
  /API/v3/CameraController/RemoveVideo/{cameraId}/{filename}:
    delete:
      parameters:
      - description: The unique identifier of the camera that owns the video.
        in: path
        name: cameraId
        required: true
        schema:
          type: string
      - description: The filename of the recorded video to delete.
        in: path
        name: filename
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      summary: Permanently deletes a specific recorded video file belonging to the
        given camera.
      tags:
      - Camera
  /API/v3/CameraController/RunONVIFCommand/{cameraId}:
    post:
      parameters:
      - description: The unique identifier of the target camera.
        in: path
        name: cameraId
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/*+json:
            schema:
              $ref: '#/components/schemas/ONVIFCommandDTO'
          application/json:
            schema:
              $ref: '#/components/schemas/ONVIFCommandDTO'
          text/json:
            schema:
              $ref: '#/components/schemas/ONVIFCommandDTO'
        description: The ONVIF command to execute, including its type and parameters.
      responses:
        '200':
          description: OK
      summary: Executes an ONVIF command on the specified camera (e.g., PTZ control,
        preset recall).
      tags:
      - Camera
  /API/v3/CameraController/UpdateCamera:
    put:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/*+json:
            schema:
              $ref: '#/components/schemas/UpdateCameraDTO'
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCameraDTO'
          text/json:
            schema:
              $ref: '#/components/schemas/UpdateCameraDTO'
        description: The DTO containing the updated camera properties.
      responses:
        '200':
          description: OK
      summary: Updates the properties of an existing camera using the values provided
        in the request body.
      tags:
      - Camera
  /API/v3/InsightsController/GetRunningProcesses:
    get:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraDTO'
            text/json:
              schema:
                $ref: '#/components/schemas/CameraDTO'
            text/plain:
              schema:
                $ref: '#/components/schemas/CameraDTO'
          description: OK
      summary: Returns information about all OS-level processes currently managed
        and monitored by the application.
      tags:
      - Insights
  /API/v3/StreamingController/Stream/{streamId}/{filename}:
    get:
      parameters:
      - description: The identifier of the stream (typically a camera ID).
        in: path
        name: streamId
        required: true
        schema:
          type: string
      - description: The HLS segment or playlist filename to serve (must match `^[0-9A-Za-z_]+\.[0-9A-Za-z]+$`).
        in: path
        name: filename
        required: true
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      summary: 'Serves an HLS stream segment or playlist file for the specified stream.

        Validates the filename format, resolves the file from the camera''s fragment
        folder,

        and returns it with the appropriate MIME type (`application/vnd.apple.mpegurl`
        for

        `.m3u8` playlists, `video/MP2T` for `.ts` segments).'
      tags:
      - Streaming
  /API/v3/UserController/CreateUser:
    put:
      parameters:
      - description: The desired username, provided via request header.
        in: header
        name: user
        schema:
          type: string
      - description: The plain-text password that will be hashed before storage, provided
          via request header.
        in: header
        name: password
        schema:
          type: string
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      summary: 'Creates a new user account with the given credentials and assigns
        the admin role to it.

        Requires the caller to hold the admin role.'
      tags:
      - User
  /API/v3/UserController/GetRoles:
    put:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
            text/json:
              schema:
                items:
                  type: string
                type: array
            text/plain:
              schema:
                items:
                  type: string
                type: array
          description: OK
      summary: Returns the list of role names assigned to the currently authenticated
        user.
      tags:
      - User
  /API/v3/UserController/GetUserInformation:
    get:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInformationDTO'
            text/json:
              schema:
                $ref: '#/components/schemas/UserInformationDTO'
            text/plain:
              schema:
                $ref: '#/components/schemas/UserInformationDTO'
          description: OK
      summary: Returns profile information (e.g., username, roles) for the currently
        authenticated user.
      tags:
      - User
  /API/v3/UserController/Login:
    put:
      parameters:
      - description: The username, provided via the `x-user` HTTP header.
        in: header
        name: x-user
        schema:
          type: string
      - description: The plain-text password, provided via the `x-password` HTTP header.
        in: header
        name: x-password
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessToken'
            text/json:
              schema:
                $ref: '#/components/schemas/AccessToken'
            text/plain:
              schema:
                $ref: '#/components/schemas/AccessToken'
          description: OK
      summary: Authenticates a user with the supplied credentials and returns a new
        access token on success.
      tags:
      - User
  /API/v3/UserController/Logout:
    put:
      parameters:
      - description: Access Token
        in: header
        name: X-AccessToken
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
      summary: Invalidates the access token of the currently authenticated user, effectively
        logging them out.
      tags:
      - User
  /API/v3/UserController/TokenIsValid:
    get:
      parameters:
      - description: The access token to validate, provided via request header.
        in: header
        name: accessToken
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: boolean
            text/json:
              schema:
                type: boolean
            text/plain:
              schema:
                type: boolean
          description: OK
      summary: Checks whether the supplied access token is still valid (not expired
        and not revoked).
      tags:
      - User
tags:
- name: Camera
- name: CommonRoutes
- name: Insights
- name: MaintenanceRoutes
- name: Streaming
- name: User
