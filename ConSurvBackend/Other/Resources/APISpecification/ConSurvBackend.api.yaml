      tags:
      - Camera
  /API/v3/CameraController/RunONVIFCommand/{cameraId}:
    post:
      parameters:
      - in: path
        name: cameraId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/*+json:
            schema:
              $ref: '#/components/schemas/ONVIFCommandDTO'
          application/json:
            schema:
              $ref: '#/components/schemas/ONVIFCommandDTO'
          text/json:
            schema:
              $ref: '#/components/schemas/ONVIFCommandDTO'
      responses:
        '200':
          description: OK
      tags:
      - Camera
  /API/v3/CameraController/UpdateCamera:
