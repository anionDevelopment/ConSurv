components:
  schemas:
    AccessToken:
      additionalProperties: false
      properties:
        expiredMoment:
          format: date-time
          type: string
        ownerUserId:
          nullable: true
          type: string
        value:
          nullable: true
          type: string
      type: object
    CameraDTO:
      additionalProperties: false
      properties:
        cameraId:
          nullable: true
          type: string
        name:
          nullable: true
          type: string
        recordModeDTO:
          $ref: '#/components/schemas/RecordModeDTO'
        recordStateDTO:
          $ref: '#/components/schemas/RecordStateDTO'
        videoInformationDTO:
          $ref: '#/components/schemas/VideoInformationDTO'
      type: object
    ONVIFCommandDTO:
      additionalProperties: false
      properties:
        commandType:
          nullable: true
          type: string
      type: object
    RecordModeDTO:
      additionalProperties: false
      properties:
        recordMode:
          nullable: true
          type: string
      type: object
    RecordStateDTO:
      additionalProperties: false
      properties:
        recordState:
          nullable: true
          type: string
      type: object
    UpdateCameraDTO:
      additionalProperties: false
      properties:
        cameraId:
          nullable: true
          type: string
        name:
          nullable: true
          type: string
        recordModeDTO:
          $ref: '#/components/schemas/RecordModeDTO'
        videoInformationDTO:
          $ref: '#/components/schemas/VideoInformationDTO'
      type: object
    UserInformationDTO:
      additionalProperties: false
      properties:
        id:
          nullable: true
          type: string
        isAdmin:
          type: boolean
        isModerator:
          type: boolean
        name:
          nullable: true
          type: string
      type: object
    VideoInformationDTO:
      additionalProperties: false
      properties:
        isONVIFCamera:
          type: boolean
        streamURL:
          nullable: true
          type: string
      type: object
info:
  contact:
    name: Contact
    url: https://consurvbackend.test.local:443/API/Other/Resources/Information/Contact
  description: ConSurvBackend is the backend for ConSurv.
  license:
    name: License
    url: https://consurvbackend.test.local:443/API/Other/Resources/Information/License
  termsOfService: https://consurvbackend.test.local:443/API/Other/Resources/Information/TermsOfService
  title: ConSurvBackend v3.0.11 API documentation
  version: v3.0.11
openapi: 3.0.4
paths:
  /API/Other/Maintenance/AvailabilityCheck:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Maintenance/CurrentVersion:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Maintenance/HealthCheck:
    get:
      responses:
        '200':
          description: OK
      tags:
      - MaintenanceRoutes
  /API/Other/Maintenance/InitializationState:
    get:
      responses:
        '200':
          description: OK
      tags:
