      <ns0:text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.7993" x="130.5" y="301.8638">Started by container-engine (for example docker).</ns0:text>
      <ns0:text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="570.0068" x="130.5" y="316.9966">The domain can be set using the commandline-parameter "--InitialDomain &lt;domain&gt;".</ns0:text>
