      <ns0:text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.3271" x="12" y="211.6045">The user calls https:</ns0:text>
      <ns0:text fill="#000000" font-family="sans-serif" font-size="13" font-style="italic" lengthAdjust="spacing" textLength="127.2007" x="128.3271" y="211.6045">&lt;domain&gt;:443 or http:</ns0:text>
      <ns0:text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="90.3525" x="255.5278" y="211.6045">&lt;domain&gt;:8080</ns0:text>
