      <ns0:text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.146" x="47.5" y="308.6045">Started by container-engine (for example docker).</ns0:text>
      <ns0:text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="494.8125" x="47.5" y="324.9561">The domain can be set using the commandline-parameter "--InitialDomain &lt;domain&gt;".</ns0:text>
      <ns0:text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.7031" x="47.5" y="341.3076">Backend and frontend are running in the container.</ns0:text>
    </ns0:g>
