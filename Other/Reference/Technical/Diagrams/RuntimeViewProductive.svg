      <ns0:text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="327.7993" x="53" y="301.8638">Started by container-engine (for example docker).</ns0:text>
      <ns0:text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="570.0068" x="53" y="316.9966">The domain can be set using the commandline-parameter "--InitialDomain &lt;domain&gt;".</ns0:text>
      <ns0:text fill="#000000" font-family="'DejaVu Sans'" font-size="13" lengthAdjust="spacing" textLength="335.5244" x="53" y="332.1294">Backend and frontend are running in the container.</ns0:text>
