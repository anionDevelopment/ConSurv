version: "3.2"

services:
  consurv_database:
    container_name: "consurv_database"
    image: ${image_mariadb}
    ports:
      - "3306:3306"
    environment:
      MARIADB_USER: user
      MARIADB_PASSWORD: pa55w0rd
      MARIADB_ROOT_PASSWORD: R00tpa55w0rd
      MARIADB_DATABASE: ConSurvDatabase
    volumes:
      - ./Volumes/ConSurvMariaDBData:/var/lib/mysql
    networks:
      - consurv_net

  consurv_database_administration:
    image: ${image_adminer}
    container_name: "consurv_database_administration"
    ports:
      - 8080:8080
    networks:
      - consurv_net

networks:
  consurv_net:
    external: true
