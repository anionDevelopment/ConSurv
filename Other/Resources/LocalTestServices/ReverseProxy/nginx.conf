worker_processes            1;
error_log                   /var/log/nginx/nginx_error.log warn;
pid                         /var/run/nginx.pid;

events {
    worker_connections      1024;
}

http {
    include                 /etc/nginx/mime.types;
    default_type            application/octet-stream;
    log_format              main  '$remote_addr - $remote_user [$time_local] "$request" ' '$status $body_bytes_sent "$http_referer" ' '"$http_user_agent" "$http_x_forwarded_for"';
    access_log              /var/log/nginx/nginx_access.log main;
    keepalive_timeout       65;
    client_max_body_size    800M;
    server_tokens           off;
    add_header              X-Content-Type-Options nosniff;
    add_header              X-Frame-Options DENY;
    add_header              X-XSS-Protection "1; mode=block";
    add_header              Referrer-Policy "origin";
    access_log /dev/stdout;
    error_log /dev/stderr;

    server {
        listen 443 ssl;
        server_name consurv.test.local;
        ssl_certificate /Workspace/Certificates/ConSurvDevelopmentCertificate.crt;
        ssl_certificate_key /Workspace/Certificates/ConSurvDevelopmentCertificate.key;
        location /API/ {
            proxy_set_header Accept-Encoding "";
            proxy_pass http://host.docker.internal:80;
        }
        location / {
            proxy_set_header Accept-Encoding "";
            proxy_pass http://host.docker.internal:4200;
        }
    }
}
