version: "3.2"

services:
  consurv_reverseproxy:
    image: nginx:1.27.4
    container_name: "consurv_reverseproxy"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf"
      - "../../DevelopmentCertificate:/Workspace/Certificates"
    ports:
      - "443:443"
    networks:
      - consurv_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
      
networks:
  consurv_net:
    external: true
