services:
  consurv_reverseproxy:
    image: ${image_nginx}
    container_name: "consurv_reverseproxy"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
      - "../../DevelopmentCertificate:/Workspace/Certificates"
    expose:
      - "443"
    networks:
      - consurv_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  consurv_net:
    external: true
