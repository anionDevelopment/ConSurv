version: '3.2'

services:

  consurv_reverseproxy:
    image: nginx:latest
    container_name: 'consurv_reverseproxy'
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf"
#     - "./Volumes/Logs:/var/log/nginx"
      - "../../DevelopmentCertificate:/Workspace/Certificates"
    #network_mode: "host"
    networks:
      - consurv_net
    ports:
      - "443:443"
    #environment:
    #  MARIADB_USER: user
networks:
  consurv_net:
    external: true