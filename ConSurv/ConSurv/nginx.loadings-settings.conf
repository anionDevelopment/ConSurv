root /Workspace/Application/Frontend/WebApplicationFiles/browser;
error_page 503 = @maintenance;

location /API/ {
    if (-f /Workspace/Configuration/MaintenanceMode.enabled) {
        return 503;
    }
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $http_host;
    proxy_redirect   off;
    proxy_pass       http://127.0.0.1:80;
}

location = / {
    if (-f /Workspace/Configuration/MaintenanceMode.enabled) {
        return 503;
    }
    return 302 /index.html;
}

location ~ ^/([a-z]+(\-[A-Z]+)?) {
    try_files $uri $uri/ /$1/index.html?$args;
}

location @maintenance {
    rewrite ^ /Workspace/Application/Frontend/WebApplicationFiles/maintenance break;
}
