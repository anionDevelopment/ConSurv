worker_processes             1;
pid                          /var/run/nginx.pid;

events {
    worker_connections       1024;
}

http {
    include                  /etc/nginx/mime.types;
    default_type             application/octet-stream;
    log_format               main  '$remote_addr - $remote_user [$time_local] "$request" ' '$status $body_bytes_sent "$http_referer" ' '"$http_user_agent" "$http_x_forwarded_for"';
    access_log               /Workspace/Logs/WebServerAccess.log main;
    error_log                /Workspace/Logs/WebServerError.log warn;
    keepalive_timeout        65;
    client_max_body_size     800M;
    server_tokens            off;
    add_header               X-Content-Type-Options nosniff;
    add_header               X-Frame-Options DENY;
    add_header               X-XSS-Protection "1; mode=block";
    add_header               Referrer-Policy "origin";

    server {
        listen               443 ssl;
        ssl_certificate      /Workspace/Other/Certificates/ConSurvDevelopmentCertificate.crt;
        ssl_certificate_key  /Workspace/Other/Certificates/ConSurvDevelopmentCertificate.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        location /API/ {
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-RequestId "";
            proxy_set_header Host $http_host;
            proxy_redirect   off;
            proxy_pass       http://127.0.0.1:80;
        }
        location = /favicon.ico {
            alias /Workspace/Application/Frontend/WebApplicationFiles/browser/assets/favicon.ico;
        }
        location / {
            index            /index.html;
            root             /Workspace/Application/Frontend/WebApplicationFiles/browser;
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen               8080;
        location /API/ {
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-RequestId "";
            proxy_set_header Host $http_host;
            proxy_redirect   off;
            proxy_pass       http://127.0.0.1:80;
        }
        location = /favicon.ico {
            alias /Workspace/Application/Frontend/WebApplicationFiles/browser/assets/favicon.ico;
        }
        location / {
            index            /index.html;
            root             /Workspace/Application/Frontend/WebApplicationFiles/browser;
            try_files $uri $uri/ /index.html;
        }
    }
}
