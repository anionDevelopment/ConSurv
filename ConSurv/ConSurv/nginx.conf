worker_processes             auto;
pid                          /var/run/nginx.pid;

events {
    worker_connections       1024;
}

http {
    include                  /etc/nginx/mime.types;
    default_type             application/octet-stream;
    log_format               main  '[$time_iso8601] $remote_addr - $remote_user "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" "$http_x_forwarded_for"';
    access_log               /Workspace/Logs/WebServerAccess.log main;
    error_log                /Workspace/Logs/WebServerError.log warn;
    keepalive_timeout        65;
    client_max_body_size     800M;
    server_tokens            off;
    add_header               X-Content-Type-Options nosniff;
    add_header               X-Frame-Options DENY;
    add_header               X-XSS-Protection "1; mode=block";
    add_header               Referrer-Policy "origin";

    server {
        listen               443 ssl;
        ssl_certificate      /Workspace/Other/Certificates/ConSurvDevelopmentCertificate.crt;
        ssl_certificate_key  /Workspace/Other/Certificates/ConSurvDevelopmentCertificate.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        include /Workspace/Application/Frontend/nginx.loadings-settings.conf;
    }

    server {
        listen               8080;
        include /Workspace/Application/Frontend/nginx.loadings-settings.conf;
    }
}
