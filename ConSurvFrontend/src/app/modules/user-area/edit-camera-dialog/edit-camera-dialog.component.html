<title mat-dialog-title i18n="@@edit-camera-dialog.title">Edit camera</title>
<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="save()">
    <mat-form-field>
      <mat-label i18n="@@edit-camera-dialog.field.name">Name</mat-label>
      <input type="text" matInput placeholder="Example: Entrance-camera" i18n-placeholder="@@edit-camera-dialog.field.name.placeholder" formControlName="name">
    </mat-form-field>
    <br>
    <mat-form-field>
      <mat-label i18n="@@edit-camera-dialog.field.stream-url">Stream-URL</mat-label>
      <input type="text" matInput placeholder="Example: rtsp://example.com" i18n-placeholder="@@edit-camera-dialog.field.stream-url.placeholder" formControlName="rtspstreamurl">
    </mat-form-field>
    <br>
    <mat-checkbox formControlName="supportsPTZViaONVIF" i18n="@@edit-camera-dialog.field.onvif">Can receive ONVIF-commands.</mat-checkbox>
    <ng-container *ngIf="supportsPTZViaONVIFFormControl.value">
      <br>
      <mat-form-field>
        <mat-label i18n="@@edit-camera-dialog.field.onvif-url">ONVIF-URL</mat-label>
        <input type="text" matInput placeholder="Example: http://192.168.1.100:8000" i18n-placeholder="@@edit-camera-dialog.field.onvif-url.placeholder" formControlName="onvifUrl">
      </mat-form-field>
      <br>
      <mat-form-field>
        <mat-label i18n="@@edit-camera-dialog.field.onvif-username">ONVIF-Username</mat-label>
        <input type="text" matInput placeholder="Example: admin" i18n-placeholder="@@edit-camera-dialog.field.onvif-username.placeholder" formControlName="onvifUsername">
      </mat-form-field>
      <br>
      <mat-form-field>
        <mat-label i18n="@@edit-camera-dialog.field.onvif-password">ONVIF-Password</mat-label>
        <input type="password" matInput formControlName="onvifPassword">
      </mat-form-field>
    </ng-container>
    <br>
    <app-record-mode-indicator [recordMode$]="recordmode$"></app-record-mode-indicator>
    <mat-form-field>
      <mat-label i18n="@@edit-camera-dialog.field.record-mode">Record-mode</mat-label>
      <mat-select formControlName="recordmodeselect">
        <mat-option value="NoRecording" i18n="@@edit-camera-dialog.record-mode.no-recording">No recording</mat-option>
        <mat-option value="RecordAlways" i18n="@@edit-camera-dialog.record-mode.record-always">Record always</mat-option>
        <mat-option value="RecordOnMovements" i18n="@@edit-camera-dialog.record-mode.record-on-movements">Record on movements</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="cancel()" cdkFocusInitial i18n="@@edit-camera-dialog.button.cancel">Cancel</button>
  <button mat-button (click)="save()" i18n="@@edit-camera-dialog.button.save">Save</button>
</mat-dialog-actions>
