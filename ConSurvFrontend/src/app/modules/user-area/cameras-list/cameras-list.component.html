<app-frame-work>
    <app-user-area-container>
        <table mat-table [dataSource]="cameras">
            <ng-container matColumnDef="preview">
                <th mat-header-cell *matHeaderCellDef class="col-preview" i18n="@@cameras-list.header.preview"> Preview </th>
                <td mat-cell *matCellDef="let element">
                    <app-camera-preview [cameraId]="element.cameraId"></app-camera-preview>
                </td>
            </ng-container>
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef i18n="@@cameras-list.header.id"> Id </th>
                <td mat-cell *matCellDef="let element"> {{element.cameraId}} </td>
            </ng-container>
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef class="col-name" i18n="@@cameras-list.header.name"> Name </th>
                <td mat-cell *matCellDef="let element">
                    <span class="link" (click)="onCameraClick(element)">
                        {{element.name}}
                    </span>
                </td>
            </ng-container>
            <ng-container matColumnDef="mode">
                <th mat-header-cell *matHeaderCellDef class="col-mode" i18n="@@cameras-list.header.mode"> Mode </th>
                <td mat-cell *matCellDef="let element">
                    <app-record-mode-indicator
                        [recordMode$]="recordModes.get(element.cameraId)!"></app-record-mode-indicator>
                </td>
            </ng-container>
            <ng-container matColumnDef="state">
                <th mat-header-cell *matHeaderCellDef class="col-state" i18n="@@cameras-list.header.state"> State </th>
                <td mat-cell *matCellDef="let element">
                    <app-record-state-indicator [recordState]="element.recordStateDTO"></app-record-state-indicator>
                </td>
            </ng-container>
            <ng-container matColumnDef="options">
                <th mat-header-cell *matHeaderCellDef class="col-options" i18n="@@cameras-list.header.options"> Options </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-button (click)="editCamera(element)"><mat-icon>edit</mat-icon></button>
                    <button mat-button (click)="removeCamera(element)"><mat-icon>delete</mat-icon></button>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <br />
        <button mat-button *ngIf="userIdModerator" (click)="addCamera()">
            <mat-icon>add</mat-icon>
        </button>
    </app-user-area-container>
</app-frame-work>
