<div class="image-wrapper"
     (mousemove)="updatePopupPosition($event)"
     (mouseleave)="popupVisible=false">
  <img [src]="image" width="100" height="75" alt="preview"/>
  
  <div class="image-popup" *ngIf="popupVisible"
       [ngStyle]="{'top.px': popupY, 'left.px': popupX}">
    <img [src]="image" alt="large preview" class="popup-img"/>
  </div>
</div>
