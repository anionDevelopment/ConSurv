<section class="layout">
  <div class="sidebar">
    <div class="drawer">
      <span i18n="@@user.menu.title">User-menu:</span>
      <br>
      <button mat-button [disabled]="false" (click)="onAdminAreaClick()">{{getSiteTitle("admin")}}</button>
      <button mat-button [disabled]="activeSite=='Dashboard'" (click)="onDashboardClick()">{{getSiteTitle("dashboard")}}</button>
      <button mat-button [disabled]="activeSite=='Cameras'" (click)="onCamerasClick()">{{getSiteTitle("cameras")}}</button>
      <button mat-button [disabled]="activeSite=='Settings'" (click)="onSettingsClick()">{{getSiteTitle("settings")}}</button>
    </div>
  </div>
  <div class="body">
    <div class="header">
      <h1>{{activeSite}}</h1>
      <app-user-icon class="user-icon"></app-user-icon>
    </div>
    <mat-divider></mat-divider>
    <div>
      <ng-content></ng-content>
    </div>
  </div>
</section>
