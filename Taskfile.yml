version: "3"
#TODO generate this file by tasks defined in workspace file
tasks:
  StartDevelopmentReverseProxy:
    aliases:
      - sdrpu
    desc: "Start development-reverse-proxy"
    dir: Other/Resources/LocalTestServices/ReverseProxy
    cmds:
      - docker compose -p developmentreverseproxy up --force-recreate -d

  StopDevelopmentReverseProxy:
    aliases:
      - sdrpd
    desc: "Stop development-reverse-proxy"
    dir: Other/Resources/LocalTestServices/ReverseProxy
    cmds:
      - docker compose -p developmentreverseproxy down
